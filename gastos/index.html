<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>gastos — raku</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">

  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/componentes.css">

  <!-- El orden importa: cada archivo usa lo que definen los anteriores. -->
  <script src="js/constantes.js" defer></script>
  <script src="js/storage.js" defer></script>
  <script src="js/logica.js" defer></script>
  <script src="js/ui.js" defer></script>
  <script src="js/main.js" defer></script>
</head>
<body>
  <div class="contenedor">
    <nav class="navegacion">
      <a class="marca-nav" href="../index.html">
        <svg class="isotipo-torii" viewBox="0 0 48 48" width="22" height="22" aria-hidden="true">
          <rect x="2" y="6" width="44" height="5" rx="1" />
          <rect x="22" y="11" width="4" height="6" />
          <rect x="7" y="17" width="34" height="4" rx="1" />
          <rect x="11" y="11" width="5" height="31" rx="1" />
          <rect x="32" y="11" width="5" height="31" rx="1" />
        </svg>
        <span>raku</span>
      </a>
      <div class="enlaces-nav">
        <a href="../proyectos/index.html">proyectos</a>
        <a href="../sobre-mi/index.html">sobre mí</a>
      </div>
    </nav>

    <header class="encabezado">
      <h1>gastos</h1>
    </header>
    <p class="subtitulo">Registro simple de gastos diarios.</p>

    <main>
      <p id="mensaje" class="mensaje" role="alert" hidden></p>

      <section class="tarjeta" aria-labelledby="titulo-nuevo-gasto">
        <h2 id="titulo-nuevo-gasto">Nuevo gasto</h2>
        <form id="formulario-gasto" novalidate>
          <div class="fila-campos">
            <div class="campo">
              <label for="campo-monto">Monto</label>
              <input type="number" id="campo-monto" min="0" step="0.01" placeholder="0.00">
            </div>
            <div class="campo">
              <label for="campo-categoria">Categoría</label>
              <select id="campo-categoria"></select>
            </div>
            <div class="campo">
              <label for="campo-fecha">Fecha</label>
              <input type="date" id="campo-fecha">
            </div>
            <button type="submit" class="boton-principal">Agregar</button>
          </div>
        </form>
      </section>

      <section class="tarjeta" aria-labelledby="titulo-filtros">
        <h2 id="titulo-filtros">Filtrar por fecha</h2>
        <div class="fila-campos">
          <div class="campo">
            <label for="filtro-desde">Desde</label>
            <input type="date" id="filtro-desde">
          </div>
          <div class="campo">
            <label for="filtro-hasta">Hasta</label>
            <input type="date" id="filtro-hasta">
          </div>
          <button type="button" id="boton-limpiar-filtros" class="boton-secundario">Limpiar</button>
        </div>
      </section>

      <section class="tarjeta" aria-labelledby="titulo-totales">
        <h2 id="titulo-totales">Totales <span id="nota-filtro" class="nota-filtro" hidden>(del período filtrado)</span></h2>
        <p class="total-general">Total: <strong id="total-general"></strong></p>
        <ul id="lista-totales-categoria" class="lista-totales"></ul>
      </section>

      <section class="tarjeta" aria-labelledby="titulo-gastos">
        <h2 id="titulo-gastos">Gastos</h2>
        <p id="aviso-lista-vacia" class="aviso-vacio" hidden></p>
        <div class="envoltorio-tabla">
          <table id="tabla-gastos">
            <thead>
              <tr>
                <th>Fecha</th>
                <th>Categoría</th>
                <th class="alinear-derecha">Monto</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="cuerpo-tabla-gastos"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
